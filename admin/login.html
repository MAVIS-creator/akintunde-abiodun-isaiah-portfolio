<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Login | Akintunde Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: { 500: "#1f6f8b", 700: "#14495d", 900: "#0d2f3d" },
              accent: { 500: "#d97706" },
            },
            fontFamily: {
              display: ["Oswald", "sans-serif"],
              body: ["Source Sans 3", "sans-serif"],
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="../assets/css/styles.css" />
  </head>
  <body class="hero-pattern min-h-screen font-body text-slate-800">
    <main
      class="mx-auto flex min-h-screen max-w-5xl items-center px-4 py-12 md:px-6"
    >
      <section
        class="grid w-full overflow-hidden rounded-2xl bg-white shadow-2xl md:grid-cols-2"
      >
        <aside class="bg-brand-900 px-7 py-10 text-white">
          <p
            class="inline-block rounded-full bg-accent-500/20 px-3 py-1 text-xs font-semibold text-accent-500"
          >
            Admin Access
          </p>
          <h1 class="mt-4 font-display text-4xl">Portfolio Control Center</h1>
          <p class="mt-4 text-sm text-slate-100">
            Use your admin credentials to publish project updates, upload
            reference letters, and manage media links.
          </p>
          <a
            href="../index.html"
            class="mt-6 inline-block text-sm font-semibold text-accent-500"
            >Back to website</a
          >
        </aside>
        <div class="px-7 py-10">
          <h2 class="font-display text-3xl text-brand-900">Login</h2>
          <p class="mt-2 text-sm text-slate-600">
            Only authorized admin account is allowed.
          </p>
          <form id="login-form" class="mt-6 space-y-4">
            <div>
              <label class="mb-1 block text-sm font-semibold">Email</label>
              <input
                id="email"
                type="email"
                required
                class="w-full rounded border border-slate-300 px-3 py-2 focus:border-brand-700 focus:outline-none"
              />
            </div>
            <div>
              <label class="mb-1 block text-sm font-semibold">Password</label>
              <input
                id="password"
                type="password"
                required
                class="w-full rounded border border-slate-300 px-3 py-2 focus:border-brand-700 focus:outline-none"
              />
            </div>
            <button
              type="submit"
              class="w-full rounded bg-brand-700 px-4 py-3 text-sm font-semibold text-white hover:bg-brand-900"
            >
              Sign in
            </button>
          </form>
          <p id="login-status" class="mt-4 text-sm"></p>
        </div>
      </section>
    </main>

    <script type="module" src="../assets/js/admin-login.js"></script>
  </body>
</html>
